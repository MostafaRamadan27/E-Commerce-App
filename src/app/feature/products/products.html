<section class="mt-10 p-5">
  <h2 class="text-4xl">Products List</h2>

  <input
    [(ngModel)]="text"
    type="search"
    class="border border-main block my-10 mx-auto rounded w-1/2"
  />

  <div class="mt-10 grid sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
    @for (product of { list:productList , searchText : text , keys:['title']} | search | paginate: {
    id: 'foo', itemsPerPage: pageSize, currentPage: p, totalItems: total } ; track product._id) {
    <app-card [product]="product" [Loading]="isLoading" />
    }
  </div>
  <div class="flex justify-center mt-5">
    <pagination-controls
      id="foo"
      (pageChange)="getAllProductData($event)"
      [previousLabel]="'prev'"
    ></pagination-controls>
  </div>
</section>

@if (Loading) {
<div class="card group group/card overflow-hidden">
  <div class="cursor-pointer">
    <div class="overflow-hidden">
      <ngx-skeleton-loader count="1" [theme]="{ width: '100%', height: '250px' }">
        <img src="" alt="" />
      </ngx-skeleton-loader>
    </div>
    <ngx-skeleton-loader count="1" appearance="line" [theme]="{ height: '10px', width: '50%' }">
      <h4 class="text-main"></h4
    ></ngx-skeleton-loader>
    <ngx-skeleton-loader count="1" appearance="line" [theme]="{ height: '10px' }">
      <h4 class="line-clamp-1"></h4
    ></ngx-skeleton-loader>

    <div class="flex justify-between items-center">
      <ngx-skeleton-loader count="1" appearance="line" [theme]="{ height: '10px', width: '40%' }"
        ><h4 class=""></h4
      ></ngx-skeleton-loader>
      <ngx-skeleton-loader count="1" appearance="line" [theme]="{ height: '30px', width: '30%' }">
        <span class="text-sm">Rating:<i class="fas fa-star text-yellow-500"></i></span>
      </ngx-skeleton-loader>
    </div>
  </div>
  <ngx-skeleton-loader count="1" appearance="line">
    <button class="btn translate-y-[130%] group-hover/card:translate-0">
      Add To Card
    </button></ngx-skeleton-loader
  >
</div>
} @else {
<div class="card group group/card overflow-hidden z-50">
  <div class="cursor-pointer" [routerLink]="['/details', product._id]">
    <div class="overflow-hidden">
      <img
        [src]="product.imageCover"
        class="w-full object-contain h-[15.625rem] group-hover:scale-150 transition-all duration-500"
        [alt]="product.title"
      />
    </div>
    <h4 class="text-main">{{ product.category.name }}</h4>
    <h4 class="line-clamp-1">{{ product.title }}</h4>
    <div class="flex justify-between items-center">
      <h4 class="">Price: {{ product.price }}Egp</h4>
      <span class="text-sm"
        >Rating: {{ product.ratingsAverage }}<i class="fas fa-star text-yellow-500"></i
      ></span>
    </div>
  </div>
  <button
    (click)="addProductToCart(product._id)"
    class="btn translate-y-[130%] group-hover/card:translate-0"
  >
    Add To Card
  </button>
</div>

}
